name: Static Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened, ready_for_review ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ktlint:
    name: Ktlint (Formatting)
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          else
            echo '{"project_info":{"project_number":"0","project_id":"placeholder","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"es.pedrazamiguez.splittrip"}},"api_key":[{"current_key":"placeholder"}]}]}' > app/google-services.json
          fi
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Ktlint Check
        run: ./gradlew ktlintCheck

  detekt:
    name: Detekt (Code Quality)
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          else
            echo '{"project_info":{"project_number":"0","project_id":"placeholder","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"es.pedrazamiguez.splittrip"}},"api_key":[{"current_key":"placeholder"}]}]}' > app/google-services.json
          fi
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Detekt with SARIF output
        run: ./gradlew detekt --continue

      - name: Merge Detekt SARIF reports
        if: always()
        run: |
          python3 - <<'EOF'
          import json, glob, os

          EMPTY_SARIF = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{"tool": {"driver": {"name": "detekt", "rules": []}}, "results": []}]
          }

          os.makedirs("build/reports/detekt", exist_ok=True)
          out_path = "build/reports/detekt/merged.sarif"

          sarif_files = glob.glob("**/build/reports/detekt/*.sarif", recursive=True)
          if not sarif_files:
              print("No SARIF files found — writing empty report")
              with open(out_path, "w") as fh:
                  json.dump(EMPTY_SARIF, fh, indent=2)
              exit(0)

          # Collect the first run as the base (tool metadata, invocations, etc.)
          # Then merge all results and rules from every other run into it.
          # This produces a single run — required by upload-sarif.
          base_run = None
          all_results = []
          rules_by_id = {}

          for f in sorted(sarif_files):
              print(f"Processing: {f}")
              with open(f) as fh:
                  data = json.load(fh)
              for run in data.get("runs", []):
                  if base_run is None:
                      base_run = run
                  # Collect results
                  all_results.extend(run.get("results", []))
                  # Collect rules (deduplicate by id)
                  driver = run.get("tool", {}).get("driver", {})
                  for rule in driver.get("rules", []):
                      rules_by_id[rule["id"]] = rule

          if base_run is None:
              print("No runs found in SARIF files — writing empty report")
              with open(out_path, "w") as fh:
                  json.dump(EMPTY_SARIF, fh, indent=2)
              exit(0)

          # Build the single merged run
          base_run["results"] = all_results
          base_run.setdefault("tool", {}).setdefault("driver", {})["rules"] = list(rules_by_id.values())

          merged = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [base_run]
          }

          with open(out_path, "w") as fh:
              json.dump(merged, fh, indent=2)

          print(f"Merged {len(sarif_files)} SARIF files into 1 run — {len(all_results)} total findings, {len(rules_by_id)} unique rules")
          EOF

      - name: Upload Detekt SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/detekt/merged.sarif
          category: "/tool:detekt"
          wait-for-processing: true
          token: ${{ github.token }}

      - name: Upload Detekt reports (HTML + SARIF)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/**

  cpd:
    name: CPD (Duplication Detection)
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          else
            echo '{"project_info":{"project_number":"0","project_id":"placeholder","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"es.pedrazamiguez.splittrip"}},"api_key":[{"current_key":"placeholder"}]}]}' > app/google-services.json
          fi
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run CPD (Copy-Paste Detector)
        run: ./gradlew cpdCheck --continue

      - name: Convert CPD XML to SARIF
        if: always()
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, json

          workspace = os.environ.get("GITHUB_WORKSPACE", "")
          cpd_xml = "build/reports/cpd/cpdCheck.xml"
          os.makedirs("build/reports/cpd", exist_ok=True)
          out_path = "build/reports/cpd/cpd.sarif"

          RULE = [{
              "id": "DuplicatedBlocks",
              "name": "DuplicatedBlocks",
              "shortDescription": {"text": "Duplicated code block"},
              "fullDescription": {"text": "A block of 100+ identical tokens is duplicated in another location. Extract the shared logic to eliminate the duplication."},
              "helpUri": "https://pmd.github.io/pmd/pmd_userdocs_cpd.html",
              "defaultConfiguration": {"level": "note"},
              "properties": {"tags": ["maintainability", "duplication"]}
          }]

          def make_sarif(results):
              return {
                  "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
                  "version": "2.1.0",
                  "runs": [{"tool": {"driver": {"name": "CPD", "rules": RULE}}, "results": results}]
              }

          def to_rel(path):
              return path.replace(workspace + "/", "") if workspace else path

          def region(f_elem, default_lines):
              start = max(1, int(f_elem.get("line", "1")))
              raw = f_elem.get("endline", "")
              end = max(start, int(raw) if raw else start + default_lines - 1)
              return {"startLine": start, "endLine": end}

          def artifact(path):
              return {"uri": to_rel(path), "uriBaseId": "%SRCROOT%"}

          results = []
          if os.path.exists(cpd_xml):
              for dup in ET.parse(cpd_xml).getroot().findall("duplication"):
                  n = int(dup.get("lines", "1"))
                  tok = dup.get("tokens", "?")
                  files = dup.findall("file")
                  if len(files) < 2:
                      continue
                  p_path = files[0].get("path", "")
                  related = [
                      {"id": i, "message": {"text": "Duplicate of primary block"},
                       "physicalLocation": {"artifactLocation": artifact(f.get("path", "")), "region": region(f, n)}}
                      for i, f in enumerate(files[1:])
                  ]
                  results.append({
                      "ruleId": "DuplicatedBlocks",
                      "level": "note",
                      "message": {"text": f"{n} duplicated lines / {tok} tokens across {len(files)} locations."},
                      "locations": [{"physicalLocation": {"artifactLocation": artifact(p_path), "region": region(files[0], n)}}],
                      "relatedLocations": related
                  })

          print(f"CPD SARIF: {len(results)} findings")
          with open(out_path, "w") as fh:
              json.dump(make_sarif(results), fh, indent=2)
          EOF

      - name: Upload CPD SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/cpd/cpd.sarif
          category: "/tool:cpd"
          wait-for-processing: true
          token: ${{ github.token }}

      - name: Upload CPD reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cpd-reports
          path: |
            build/reports/cpd/**

  no-emoji-in-strings:
    name: No Emoji in String Resources
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Check for emoji characters in strings.xml files
        run: |
          grep_exit_code=0
          grep -rn --include="strings.xml" -P \
            "[\x{1F300}-\x{1FFFF}]|[\x{2600}-\x{27BF}]|[\x{1F600}-\x{1F64F}]|[\x{1F900}-\x{1F9FF}]|[\x{1F1E6}-\x{1F1FF}]{2}|[\x{00A9}\x{00AE}\x{2122}]\x{FE0F}|[0-9#*]\x{FE0F}?\x{20E3}" \
            . || grep_exit_code=$?

          if [ "$grep_exit_code" -eq 0 ]; then
            echo "❌ Emoji characters found in strings.xml — please remove them."
            exit 1
          elif [ "$grep_exit_code" -eq 1 ]; then
            echo "✅ No emoji characters found in strings.xml files."
          else
            echo "❌ Failed to scan strings.xml files for emoji characters (grep exit code: $grep_exit_code)."
            exit "$grep_exit_code"
          fi

  android-lint:
    name: Android Lint
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      OER_APP_ID_RELEASE: ${{ secrets.OER_APP_ID_RELEASE }}
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=false -Dorg.gradle.daemon=false -Dorg.gradle.caching=true"
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          else
            echo '{"project_info":{"project_number":"0","project_id":"placeholder","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"es.pedrazamiguez.splittrip"}},"api_key":[{"current_key":"placeholder"}]}]}' > app/google-services.json
          fi
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Android Lint
        # continue-on-error because abortOnError=true in build.gradle.kts causes a non-zero
        # exit when findings are present. Reports are still generated before the abort, so
        # the SARIF merge and upload steps will always have files to process.
        continue-on-error: true
        run: ./gradlew lintDebug

      - name: Merge Android Lint SARIF reports
        if: always()
        run: |
          python3 - <<'EOF'
          import json, glob, os

          os.makedirs("build/reports/lint", exist_ok=True)
          out_path = "build/reports/lint/merged.sarif"

          EMPTY_SARIF = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{"tool": {"driver": {"name": "Android Lint", "rules": []}}, "results": []}]
          }

          sarif_files = glob.glob("**/build/reports/lint-results-debug.sarif", recursive=True)
          if not sarif_files:
              print("No lint SARIF files found — writing empty report")
              with open(out_path, "w") as fh:
                  json.dump(EMPTY_SARIF, fh, indent=2)
          else:
              base_run = None
              all_results = []
              rules_by_id = {}

              for f in sorted(sarif_files):
                  print(f"Processing: {f}")
                  with open(f) as fh:
                      data = json.load(fh)
                  for run in data.get("runs", []):
                      if base_run is None:
                          base_run = run
                      all_results.extend(run.get("results", []))
                      driver = run.get("tool", {}).get("driver", {})
                      for rule in driver.get("rules", []):
                          rules_by_id[rule["id"]] = rule

              if base_run is None:
                  print("No runs found — writing empty report")
                  with open(out_path, "w") as fh:
                      json.dump(EMPTY_SARIF, fh, indent=2)
              else:
                  base_run["results"] = all_results
                  base_run.setdefault("tool", {}).setdefault("driver", {})["rules"] = list(rules_by_id.values())
                  merged = {
                      "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
                      "version": "2.1.0",
                      "runs": [base_run]
                  }
                  with open(out_path, "w") as fh:
                      json.dump(merged, fh, indent=2)
                  print(f"Merged {len(sarif_files)} SARIF files — {len(all_results)} findings, {len(rules_by_id)} rules")
          EOF

      - name: Upload Android Lint SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/lint/merged.sarif
          category: "/tool:android-lint"
          wait-for-processing: true
          token: ${{ github.token }}

      - name: Upload Android Lint reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-lint-reports
          path: |
            **/build/reports/lint-results-debug.html
            **/build/reports/lint-results-debug.sarif
